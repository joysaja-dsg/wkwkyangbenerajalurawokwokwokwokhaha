  <style>

    }

      background: radial-gradient(circle at 20% 30%, #0a0c10, #030507);

      font-family: 'Inter', 'Outfit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .parent {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: repeat(10, 1fr);
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
    }

    .navbar {
      grid-area: 2 / 2 / 3 / 12;
      background: #1e1f24;

      height: 42px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.08), 0 4px 8px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .brand-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 30px;
    }

    .brand-text {
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #e2e8f0, #b9c3db);
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-menu {
      display: flex;
      gap: 0.75rem;
      background: #15161c;
      padding: 0.35rem;
      border-radius: 100px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.03);
    }

    .menu-item {
      background: transparent;
      border: none;
      padding: 0.65rem 1.8rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border-radius: 60px;

      align-items: center;
      gap: 10px;
      color: #a0a5b8;
      position: relative;

      transition: transform 0.2s ease, color 0.2s;

      color: #f0f3fa;
      background: rgba(60, 70, 100, 0.4);

<div class="parent">

    </div>

    <div class="nav-menu">
      <button class="menu-item active" data-menu="script">
        <i class="fas fa-scroll"></i> Script
      </button>
      <button class="menu-item" data-menu="executor">
        <i class="fas fa-bolt"></i> Executor
      </button>
      <button class="menu-item" data-menu="discord">
        <i class="fab fa-discord"></i> Discord
      </button>
    </div>

      <div class="status-badge">Online</div>
    </div>
  </div>

<script>
  const menuBtns = document.querySelectorAll('.menu-item');

  function setActiveMenu(menuId) {
    menuBtns.forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-menu') === menuId);
    });
  }

  menuBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      const menuValue = btn.getAttribute('data-menu');
      if (!menuValue) return;

      btn.style.transform = 'scale(0.94)';
      setTimeout(() => btn.style.transform = '', 150);

      setActiveMenu(menuValue);

      const ripple = document.createElement('span');
      Object.assign(ripple.style, {
        position: 'absolute',
        width: '8px',
        height: '8px',
        background: 'rgba(140,170,255,0.5)',
        borderRadius: '50%',
        transform: 'translate(-50%, -50%) scale(0)',
        transition: 'transform 0.4s, opacity 0.5s'
      });

      const rect = btn.getBoundingClientRect();
      ripple.style.left = (e.clientX - rect.left) + 'px';
      ripple.style.top = (e.clientY - rect.top) + 'px';

      btn.appendChild(ripple);

      requestAnimationFrame(() => {
        ripple.style.transform = 'translate(-50%, -50%) scale(8)';
        ripple.style.opacity = '0';
      });

      setTimeout(() => ripple.remove(), 400);
    });
  });

  setActiveMenu('script');

  const navbar = document.querySelector('.navbar');
  navbar.addEventListener('mousemove', (e) => {
    navbar.style.setProperty('--x', (e.offsetX / navbar.clientWidth) * 100 + '%');
    navbar.style.setProperty('--y', (e.offsetY / navbar.clientHeight) * 100 + '%');
  });
</script>
