<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>JoyWardana | Roblox Script Hub - RGB Music Theme</title>
  <!-- Font Awesome 6 (Free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter + Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', 'Outfit', sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.7) contrast(1.1) saturate(1.2);
    }

    /* Overlay RGB: BIRU MUDA & PINK MUDA */
    .rgb-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 50%, rgba(173,216,230,0.2), rgba(255,182,193,0.15), rgba(135,206,250,0.2));
      z-index: -1;
      pointer-events: none;
      animation: rgbShift 12s infinite alternate;
    }

    @keyframes rgbShift {
      0% { background: radial-gradient(circle at 30% 50%, rgba(173,216,230,0.25), rgba(255,182,193,0.1), rgba(135,206,250,0.2)); }
      50% { background: radial-gradient(circle at 70% 60%, rgba(255,182,193,0.25), rgba(173,216,230,0.15), rgba(255,105,180,0.1)); }
      100% { background: radial-gradient(circle at 20% 80%, rgba(135,206,250,0.3), rgba(255,182,193,0.2), rgba(173,216,230,0.25)); }
    }

    .parent {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: auto auto auto;
      gap: 1rem;
      width: 100%;
      max-width: 1400px;
      background: transparent;
      margin: 0 auto;
      position: relative;
      z-index: 5;
    }

    .navbar {
      grid-column: 2 / 12;
      position: sticky;
      top: 1rem;
      z-index: 100;
      background: rgba(20, 22, 32, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 80px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1.5rem;
      border: 1px solid rgba(173, 216, 230, 0.6);
      transition: all 0.2s ease;
      flex-wrap: wrap;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 0.5rem;
    }

    .brand-icon {
      background: linear-gradient(145deg, #2c2e3a, #1b1d26);
      width: 42px;
      height: 42px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.08), 0 4px 8px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .brand-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-text {
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #89CFF0, #FFB6C1, #87CEEB);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 5px rgba(135,206,235,0.4);
    }

    /* Tombol Musik dengan border RGB */
    .music-toggle-btn {
      background: #ff4d6d;
      border: none;
      padding: 8px 18px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
      color: white;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 0 8px rgba(173,216,230,0.5);
      position: relative;
      overflow: hidden;
    }
    .music-toggle-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50px;
      padding: 2px;
      background: linear-gradient(125deg, #89CFF0, #FFB6C1, #87CEEB);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.8;
    }
    .music-toggle-btn.playing {
      background: #2ecc71;
      box-shadow: 0 0 12px rgba(46,204,113,0.6);
    }
    .music-toggle-btn.playing::before {
      background: linear-gradient(125deg, #89CFF0, #FFB6C1, #2ecc71);
    }
    .music-toggle-btn:active {
      transform: scale(0.96);
    }

    .nav-menu {
      display: flex;
      gap: 0.75rem;
      background: rgba(0, 0, 0, 0.4);
      padding: 0.35rem;
      border-radius: 100px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.03);
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu-item {
      background: transparent;
      border: none;
      padding: 0.65rem 1.8rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #d1d5f0;
      letter-spacing: -0.2px;
      position: relative;
    }

    .menu-item i {
      font-size: 1rem;
      transition: transform 0.2s ease;
    }

    .menu-item:hover {
      color: #ffffff;
      background: rgba(135, 206, 250, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 0 12px rgba(135,206,250,0.5);
    }

    .menu-item.active {
      background: linear-gradient(115deg, #FFB6C1, #89CFF0);
      color: white;
      box-shadow: 0 4px 15px rgba(137,207,240,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
      border: 0.5px solid rgba(255,255,255,0.3);
    }

    .menu-item.active i {
      color: #fff;
      text-shadow: 0 0 3px white;
    }

    .status-badge {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #b9ffd6;
      box-shadow: inset 0 1px 1px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.05);
      border: 1px solid rgba(173,216,230,0.5);
    }

    .hero-section {
      grid-column: 2 / 12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding: 1rem;
      width: 100%;
      transition: opacity 0.25s ease, transform 0.25s ease;
      opacity: 1;
      transform: translateY(0);
    }
    .fade-out {
      opacity: 0;
      transform: translateY(8px);
    }

    .search-container {
      width: 100%;
      max-width: 580px;
      margin: 1.2rem auto 1rem auto;
    }

    .search-wrapper {
      display: flex;
      align-items: center;
      background: rgba(26, 28, 36, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 0.2rem 1.4rem;
      border: 1px solid rgba(173,216,230,0.7);
      box-shadow: 0 8px 20px -8px rgba(0,0,0,0.4);
      transition: all 0.2s;
    }
    .search-wrapper:focus-within {
      border-color: #FFB6C1;
      box-shadow: 0 0 15px rgba(255,182,193,0.4);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.85rem 0;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: #f0f3ff;
      outline: none;
    }

    .search-input::placeholder {
      color: #a0a5c0;
    }

    .search-icon {
      color: #FFB6C1;
      font-size: 1.1rem;
      margin-right: 0.8rem;
      text-shadow: 0 0 3px #FFB6C1;
    }

    .hero-title {
      font-size: 2.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #89CFF0, #FFB6C1, #87CEEB);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
      text-shadow: 0 0 8px rgba(135,206,235,0.3);
    }

    .hero-description {
      max-width: 800px;
      background: rgba(20, 22, 35, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 1.5rem 2rem;
      border: 1px solid rgba(173,216,230,0.5);
      margin-top: 1.5rem;
    }

    .hero-description p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #e2e8ff;
    }

    .back-button {
      background: linear-gradient(95deg, #FFB6C1, #89CFF0);
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      margin-bottom: 1.5rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
      font-size: 0.9rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .back-button:hover {
      background: linear-gradient(95deg, #ffc0cb, #a0d6ff);
      transform: translateX(-2px);
      box-shadow: 0 4px 15px rgba(137,207,240,0.5);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      width: 100%;
      margin-top: 1rem;
    }

    .card {
      border-radius: 20px;
      background: rgba(30, 31, 40, 0.8);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(173,216,230,0.5);
      transition: all 0.25s ease;
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #FFB6C1;
      box-shadow: 0 20px 30px -10px rgba(255,182,193,0.4), 0 0 12px rgba(137,207,240,0.3);
    }

    .card-inner {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1rem 1.2rem;
      cursor: pointer;
      background: rgba(26, 28, 36, 0.9);
      flex: 1;
    }

    .card-inner img {
      width: 84px;
      height: 84px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
      background: #101114;
      flex-shrink: 0;
      border: 1px solid rgba(255,182,193,0.6);
    }

    .card-inner div {
      font-weight: 600;
      font-size: 1rem;
      color: #f0f3ff;
      text-align: left;
      flex: 1;
      word-break: break-word;
    }

    .card-inner i {
      font-size: 1.3rem;
      color: #89CFF0;
      flex-shrink: 0;
      text-shadow: 0 0 3px #89CFF0;
    }

    .empty-state {
      color: #ffb3c6;
      background: rgba(30,31,40,0.8);
      backdrop-filter: blur(4px);
      padding: 2rem;
      border-radius: 28px;
      text-align: center;
      border: 1px solid #FFB6C1;
    }

    .countdown-container {
      text-align: center;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      padding: 2rem;
      border-radius: 32px;
      border: 1px solid rgba(173,216,230,0.6);
    }
    .countdown-img {
      width: 100%;
      max-width: 280px;
      height: auto;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      border: 2px solid #FFB6C1;
    }

    @media (max-width: 850px) {
      .navbar { padding: 0.5rem 1rem; border-radius: 50px; justify-content: center; gap: 0.8rem; top: 0.5rem; }
      .nav-menu { order: 2; width: 100%; justify-content: center; }
      .nav-brand { order: 1; }
      .music-toggle-btn { order: 3; margin: 0 auto; }
      .nav-extra { order: 4; }
      .menu-item { padding: 0.4rem 1rem; font-size: 0.8rem; }
      .hero-title { font-size: 2rem; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
      .card-inner img { width: 70px; height: 70px; }
    }

    @media (max-width: 600px) {
      .hero-section { padding: 0.5rem; }
      .hero-title { font-size: 1.8rem; }
      .card-inner img { width: 60px; height: 60px; }
      .card-inner div { font-size: 0.9rem; }
      .card-inner { padding: 0.8rem; gap: 0.8rem; }
      .countdown-img { max-width: 200px; }
    }

    @media (max-width: 480px) {
      .card-grid { grid-template-columns: 1fr; }
    }

    .navbar {
      --x: 50%;
      --y: 50%;
      position: sticky;
      overflow: hidden;
    }
    .navbar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(173, 216, 230, 0.25), transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      border-radius: inherit;
    }
    .navbar:hover::before { opacity: 1; }
  </style>
</head>
<body>

<video class="video-background" autoplay loop muted playsinline>
  <source src="bg.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>
<div class="rgb-overlay"></div>

<div class="parent">
  <div class="navbar">
    <div class="nav-brand">
      <div class="brand-icon">
        <img src="fav.png" alt="JoyWardana Icon" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'fas fa-crown\'></i>';">
      </div>
      <div class="brand-text">JoyWardana</div>
    </div>
    <button id="musicToggleBtn" class="music-toggle-btn"><i class="fas fa-play"></i> Play Music</button>
    <div class="nav-menu">
      <button class="menu-item" data-menu="home"><i class="fas fa-home"></i> Home</button>
      <button class="menu-item" data-menu="script"><i class="fas fa-scroll"></i> Script</button>
      <button class="menu-item" data-menu="executor"><i class="fas fa-bolt"></i> Executor</button>
      <button class="menu-item" data-menu="discord"><i class="fab fa-discord"></i> Discord</button>
    </div>
    <div class="nav-extra">
      <div class="status-badge"><i class="fas fa-circle" style="font-size: 0.6rem; color: #3aff8e; margin-right: 6px;"></i> Online</div>
    </div>
  </div>
  <div class="hero-section" id="dynamicContent"></div>
</div>

<script>
  // ======================= DATA SCRIPT & EXECUTOR =======================
  const scriptData = [
    { name: "SAILOR PIECE SCRIPT", img: "https://i.imgur.com/zZ3YUdf.png", children: [
      { name: "Mola Hub", img: "https://i.imgur.com/zZ3YUdf.png", link: "https://sub2unlock.io/ADEjv" },
      { name: "Vora Hub", img: "https://i.imgur.com/zZ3YUdf.png", link: "https://sub2unlock.io/CNhaU" },
      { name: "Void Hub", img: "https://i.imgur.com/zZ3YUdf.png", link: "https://sub2unlock.io/dJPvV" }
    ]},
    { name: "VIOLENCE DISTRICT SCRIPT", img: "https://i.imgur.com/lnFN0aw.jpeg", children: [
      { name: "ZiaanHub", img: "https://i.imgur.com/lnFN0aw.jpeg", link: "https://sub2unlock.io/pTM1O" }
    ]}
  ];
  const executorData = [
    { name: "DELTA ANDROID VERSION", img: "https://i.imgur.com/1rKsOA2.jpeg", children: [
      { name: "DELTA VERSI 2.716", img: "https://i.imgur.com/1rKsOA2.jpeg", link: "https://sub2unlock.io/Dtdrh" }
    ]}
  ];

  // ======================= MUSIC PLAYER (Local music.mp3 seperti bg.mp4) =======================
  let audio = null;
  let isMusicPlaying = false;
  const musicBtn = document.getElementById('musicToggleBtn');
  
  function initMusic() {
    audio = new Audio();
    audio.loop = true;
    audio.volume = 0.5;
    audio.src = 'music.mp3'; // cukup detect music.mp3 di folder yang sama
    audio.load();
    audio.addEventListener('error', () => {
      console.warn("File music.mp3 tidak ditemukan, pastikan file ada di folder yang sama dengan index.html");
    });
  }
  
  function toggleMusic() {
    if (!audio) initMusic();
    if (isMusicPlaying) {
      audio.pause();
      isMusicPlaying = false;
      musicBtn.classList.remove('playing');
      musicBtn.innerHTML = '<i class="fas fa-play"></i> Play Music';
    } else {
      audio.play().catch(e => console.log("Autoplay dicegah, klik ulang jika diperlukan"));
      isMusicPlaying = true;
      musicBtn.classList.add('playing');
      musicBtn.innerHTML = '<i class="fas fa-stop"></i> Stop Music';
    }
  }
  
  if (musicBtn) {
    musicBtn.addEventListener('click', (e) => {
      e.preventDefault();
      toggleMusic();
    });
  }
  
  window.addEventListener('load', () => {
    initMusic();
    // Tidak auto-play, menunggu interaksi user
  });

  // ======================= RENDER ENGINE & NAVIGATION =======================
  let currentView = "home", currentMenu = "home";
  const contentDiv = document.getElementById("dynamicContent");

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function transitionTo(newRenderFn) {
    contentDiv.classList.add("fade-out");
    setTimeout(() => {
      newRenderFn();
      contentDiv.classList.remove("fade-out");
    }, 200);
  }

  function performSearch(keyword, resultArea) {
    const trimmed = keyword.toLowerCase().trim();
    if (trimmed.length < 2) {
      resultArea.innerHTML = '';
      return;
    }
    let results = [];
    const searchInArray = (dataArray) => {
      dataArray.forEach(category => {
        if (category.name.toLowerCase().includes(trimmed)) {
          results.push({ type: "category", data: category });
        }
        category.children.forEach(child => {
          if (child.name.toLowerCase().includes(trimmed)) {
            results.push({ type: "child", data: child, parentImg: category.img });
          }
        });
      });
    };
    searchInArray(scriptData);
    searchInArray(executorData);
    
    if (results.length === 0) {
      resultArea.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open"></i> Tidak ditemukan script yang cocok.</div>`;
      return;
    }
    
    let cardsHtml = `<div class="card-grid">`;
    results.forEach(res => {
      if (res.type === "category") {
        const cat = res.data;
        cardsHtml += `<div class="card"><div class="card-inner" onclick='renderDetailFromCategory(${JSON.stringify(cat)})'><img src="${cat.img}" onerror="this.src='https://i.imgur.com/placeholder.png'"><div>${escapeHtml(cat.name)}</div><i class="fas fa-chevron-right"></i></div></div>`;
      } else {
        const child = res.data;
        cardsHtml += `<div class="card"><div class="card-inner" onclick='openLinkWithTimer(${JSON.stringify(child)})'><img src="${child.img}" onerror="this.src='https://i.imgur.com/placeholder.png'"><div>${escapeHtml(child.name)}</div><i class="fas fa-download"></i></div></div>`;
      }
    });
    cardsHtml += `</div>`;
    resultArea.innerHTML = cardsHtml;
  }

  function renderHome() {
    currentView = "home";
    contentDiv.innerHTML = `
      <div class="hero-title">JoyWardana</div>
      <div class="search-container">
        <div class="search-wrapper">
          <i class="fas fa-search search-icon"></i>
          <input type="text" class="search-input" id="globalSearchInput" placeholder="Cari script..." autocomplete="off">
        </div>
      </div>
      <div id="searchResultArea" style="width:100%;"></div>
      <div class="hero-description">
        <p>Tempat terbaik untuk menemukan script Roblox terbaru. Support PC & Mobile, update cepat, dan anti crash. Akses script Sailor Piece, Violence District, Delta Executor, dan lainnya.</p>
      </div>
    `;
    const searchInput = document.getElementById("globalSearchInput");
    const resultArea = document.getElementById("searchResultArea");
    
    if (searchInput) {
      searchInput.addEventListener("input", (e) => {
        performSearch(e.target.value, resultArea);
      });
      searchInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          performSearch(e.target.value, resultArea);
        }
      });
    }
    if (resultArea) resultArea.innerHTML = '';
  }
