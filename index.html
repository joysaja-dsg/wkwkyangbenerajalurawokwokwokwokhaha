<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>JoyWardana | Roblox Script Hub - RGB Theme</title>
  <!-- Font Awesome 6 (Free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts: Inter + Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', 'Outfit', sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    /* Video Background */
    .video-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: brightness(0.7) contrast(1.1) saturate(1.2);
    }

    /* Overlay dinamis RGB semi-transparan untuk memperkuat warna */
    .rgb-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 50%, rgba(255,0,100,0.15), rgba(0,255,200,0.1), rgba(100,0,255,0.2));
      z-index: -1;
      pointer-events: none;
      animation: rgbShift 12s infinite alternate;
    }

    @keyframes rgbShift {
      0% { background: radial-gradient(circle at 30% 50%, rgba(255,0,80,0.2), rgba(0,255,200,0.05), rgba(100,0,255,0.2)); }
      50% { background: radial-gradient(circle at 70% 60%, rgba(0,255,150,0.2), rgba(255,100,0,0.1), rgba(150,0,255,0.2)); }
      100% { background: radial-gradient(circle at 20% 80%, rgba(255,50,150,0.2), rgba(0,200,255,0.1), rgba(200,0,255,0.2)); }
    }

    .parent {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-template-rows: auto auto auto;
      gap: 1rem;
      width: 100%;
      max-width: 1400px;
      background: transparent;
      margin: 0 auto;
      position: relative;
      z-index: 5;
    }

    /* Navbar - dengan efek kaca & neon RGB */
    .navbar {
      grid-column: 2 / 12;
      position: sticky;
      top: 1rem;
      z-index: 100;
      background: rgba(20, 22, 32, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 80px;
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1.5rem;
      border: 1px solid rgba(0, 255, 255, 0.4);
      transition: all 0.2s ease;
      flex-wrap: wrap;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 0.5rem;
    }

    .brand-icon {
      background: linear-gradient(145deg, #2c2e3a, #1b1d26);
      width: 42px;
      height: 42px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.08), 0 4px 8px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .brand-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .brand-text {
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #ff4d6d, #3b82f6, #a855f7);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      text-shadow: 0 0 5px rgba(255,77,109,0.3);
    }

    .nav-menu {
      display: flex;
      gap: 0.75rem;
      background: rgba(0, 0, 0, 0.4);
      padding: 0.35rem;
      border-radius: 100px;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.03);
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu-item {
      background: transparent;
      border: none;
      padding: 0.65rem 1.8rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #d1d5f0;
      letter-spacing: -0.2px;
      position: relative;
    }

    .menu-item i {
      font-size: 1rem;
      transition: transform 0.2s ease;
    }

    .menu-item:hover {
      color: #ffffff;
      background: rgba(59, 130, 246, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 0 12px rgba(59,130,246,0.5);
    }

    .menu-item.active {
      background: linear-gradient(115deg, #ff4d6d, #3b82f6);
      color: white;
      box-shadow: 0 4px 15px rgba(59,130,246,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
      border: 0.5px solid rgba(255,255,255,0.3);
    }

    .menu-item.active i {
      color: #fff;
      text-shadow: 0 0 3px white;
    }

    .status-badge {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      padding: 6px 16px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #b9ffd6;
      box-shadow: inset 0 1px 1px rgba(0,0,0,0.3), 0 1px 0 rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,200,0.3);
    }

    /* AREA KONTEN DINAMIS */
    .hero-section {
      grid-column: 2 / 12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      text-align: center;
      padding: 1rem;
      width: 100%;
      transition: opacity 0.25s ease, transform 0.25s ease;
      opacity: 1;
      transform: translateY(0);
    }
    .fade-out {
      opacity: 0;
      transform: translateY(8px);
    }

    .search-container {
      width: 100%;
      max-width: 580px;
      margin: 1.2rem auto 1rem auto;
    }

    .search-wrapper {
      display: flex;
      align-items: center;
      background: rgba(26, 28, 36, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      padding: 0.2rem 1.4rem;
      border: 1px solid rgba(0, 255, 255, 0.5);
      box-shadow: 0 8px 20px -8px rgba(0,0,0,0.4);
      transition: all 0.2s;
    }
    .search-wrapper:focus-within {
      border-color: #ff4d6d;
      box-shadow: 0 0 15px rgba(255,77,109,0.4);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.85rem 0;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      color: #f0f3ff;
      outline: none;
    }

    .search-input::placeholder {
      color: #a0a5c0;
    }

    .search-icon {
      color: #ff4d6d;
      font-size: 1.1rem;
      margin-right: 0.8rem;
      text-shadow: 0 0 3px #ff4d6d;
    }

    .hero-title {
      font-size: 2.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ff4d6d, #3b82f6, #a855f7);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.5px;
      text-shadow: 0 0 8px rgba(59,130,246,0.3);
    }

    .hero-description {
      max-width: 800px;
      background: rgba(20, 22, 35, 0.7);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 1.5rem 2rem;
      border: 1px solid rgba(0, 255, 255, 0.3);
      margin-top: 1.5rem;
    }

    .hero-description p {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #e2e8ff;
    }

    .back-button {
      background: linear-gradient(95deg, #ff4d6d, #3b82f6);
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      margin-bottom: 1.5rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
      font-size: 0.9rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .back-button:hover {
      background: linear-gradient(95deg, #ff6b85, #5a9eff);
      transform: translateX(-2px);
      box-shadow: 0 4px 15px rgba(59,130,246,0.5);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      width: 100%;
      margin-top: 1rem;
    }

    .card {
      border-radius: 20px;
      background: rgba(30, 31, 40, 0.8);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(0, 255, 200, 0.3);
      transition: all 0.25s ease;
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.4);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #ff4d6d;
      box-shadow: 0 20px 30px -10px rgba(255,77,109,0.4), 0 0 12px rgba(59,130,246,0.3);
    }

    .card-inner {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1rem 1.2rem;
      cursor: pointer;
      background: rgba(26, 28, 36, 0.9);
      flex: 1;
    }

    .card-inner img {
      width: 84px;
      height: 84px;
      object-fit: cover;
      border-radius: 10px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.3);
      background: #101114;
      flex-shrink: 0;
      border: 1px solid rgba(255,77,109,0.5);
    }

    .card-inner div {
      font-weight: 600;
      font-size: 1rem;
      color: #f0f3ff;
      text-align: left;
      flex: 1;
      word-break: break-word;
    }

    .card-inner i {
      font-size: 1.3rem;
      color: #3b82f6;
      flex-shrink: 0;
      text-shadow: 0 0 3px #3b82f6;
    }

    .btn-get {
      margin-top: 1rem;
      padding: 14px 22px;
      width: 100%;
      border: none;
      background: linear-gradient(95deg, #ff4d6d, #a855f7);
      color: white;
      font-weight: bold;
      font-size: 1rem;
      border-radius: 60px;
      cursor: pointer;
      transition: 0.2s;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 15px rgba(255,77,109,0.4);
    }
    .btn-get:hover {
      transform: scale(0.98);
      background: linear-gradient(95deg, #ff6b85, #b86eff);
    }

    .empty-state {
      color: #ffb3c6;
      background: rgba(30,31,40,0.8);
      backdrop-filter: blur(4px);
      padding: 2rem;
      border-radius: 28px;
      text-align: center;
      border: 1px solid #ff4d6d;
    }

    .countdown-container {
      text-align: center;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      padding: 2rem;
      border-radius: 32px;
      border: 1px solid rgba(0,255,255,0.5);
    }
    .countdown-img {
      width: 100%;
      max-width: 280px;
      height: auto;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      border: 2px solid #ff4d6d;
    }

    @media (max-width: 850px) {
      .navbar { padding: 0.5rem 1rem; border-radius: 50px; justify-content: center; gap: 0.8rem; top: 0.5rem; }
      .nav-menu { order: 2; width: 100%; justify-content: center; }
      .nav-brand { order: 1; }
      .nav-extra { order: 3; }
      .menu-item { padding: 0.4rem 1rem; font-size: 0.8rem; }
      .hero-title { font-size: 2rem; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
      .card-inner img { width: 70px; height: 70px; }
    }

    @media (max-width: 600px) {
      .hero-section { padding: 0.5rem; }
      .hero-title { font-size: 1.8rem; }
      .card-inner img { width: 60px; height: 60px; }
      .card-inner div { font-size: 0.9rem; }
      .card-inner { padding: 0.8rem; gap: 0.8rem; }
      .countdown-img { max-width: 200px; }
    }

    @media (max-width: 480px) {
      .card-grid { grid-template-columns: 1fr; }
    }

    .navbar {
      --x: 50%;
      --y: 50%;
      position: sticky;
      overflow: hidden;
    }
    .navbar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(0, 255, 255, 0.2), transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      border-radius: inherit;
    }
    .navbar:hover::before { opacity: 1; }
  </style>
</head>
<body>

<!-- VIDEO BACKGROUND -->
<video class="video-background" autoplay loop muted playsinline>
  <source src="/Aset/bg.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>
<!-- Overlay RGB dinamis -->
<div class="rgb-overlay"></div>

<div class="parent">
  <div class="navbar">
    <div class="nav-brand">
      <div class="brand-icon">
        <img src="/Aset/fav.png" alt="JoyWardana Icon" onerror="this.onerror=null; this.parentElement.innerHTML='<i class=\'fas fa-crown\'></i>';">
      </div>
      <div class="brand-text">JoyWardana</div>
    </div>
    <div class="nav-menu">
      <button class="menu-item" data-menu="home"><i class="fas fa-home"></i> Home</button>
      <button class="menu-item" data-menu="script"><i class="fas fa-scroll"></i> Script</button>
      <button class="menu-item" data-menu="executor"><i class="fas fa-bolt"></i> Executor</button>
      <button class="menu-item" data-menu="discord"><i class="fab fa-discord"></i> Discord</button>
    </div>
    <div class="nav-extra">
      <div class="status-badge"><i class="fas fa-circle" style="font-size: 0.6rem; color: #3aff8e; margin-right: 6px;"></i> Online</div>
    </div>
  </div>

  <div class="hero-section" id="dynamicContent"></div>
</div>

<script>

  const scriptData = [
    { name: "SAILOR PIECE SCRIPT", img: "https://i.imgur.com/zZ3YUdf.png", children: [
      { name: "Mola Hub", img: "https://i.imgur.com/zZ3YUdf.png", link: "https://sub4unlock.io/PSik1" },
      { name: "Vora Hub", img: "https://i.imgur.com/zZ3YUdf.png", link: "https://sub4unlock.io/rZgM1" },
      { name: "Void Hub", img: "https://i.imgur.com/zZ3YUdf.png", link: "https://sub4unlock.io/icn6r" }
    ]},
    { name: "VIOLENCE DISTRICT SCRIPT", img: "https://i.imgur.com/lnFN0aw.jpeg", children: [
      { name: "ZiaanHub", img: "https://i.imgur.com/lnFN0aw.jpeg", link: "https://sub2unlock.io/W1Uhj" }
    ]}
  ];
  const executorData = [
    { name: "DELTA ANDROID VERSION", img: "https://i.imgur.com/1rKsOA2.jpeg", children: [
      { name: "DELTA VERSI 2.716", img: "https://i.imgur.com/1rKsOA2.jpeg", link: "https://sfl.gl/6eZ5e" }
    ]}
  ];

  let currentView = "home", currentMenu = "home";
  const contentDiv = document.getElementById("dynamicContent");

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function transitionTo(newRenderFn) {
    contentDiv.classList.add("fade-out");
    setTimeout(() => {
      newRenderFn();
      contentDiv.classList.remove("fade-out");
    }, 200);
  }

  function performSearch(keyword, resultArea) {
    const trimmed = keyword.toLowerCase().trim();
    if (trimmed.length < 2) {
      resultArea.innerHTML = '';
      return;
    }
    let results = [];
    const searchInArray = (dataArray) => {
      dataArray.forEach(category => {
        if (category.name.toLowerCase().includes(trimmed)) {
          results.push({ type: "category", data: category });
        }
        category.children.forEach(child => {
          if (child.name.toLowerCase().includes(trimmed)) {
            results.push({ type: "child", data: child, parentImg: category.img });
          }
        });
      });
    };
    searchInArray(scriptData);
    searchInArray(executorData);
    
    if (results.length === 0) {
      resultArea.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open"></i> Tidak ditemukan script yang cocok.</div>`;
      return;
    }
    
    let cardsHtml = `<div class="card-grid">`;
    results.forEach(res => {
      if (res.type === "category") {
        const cat = res.data;
        cardsHtml += `<div class="card"><div class="card-inner" onclick='renderDetailFromCategory(${JSON.stringify(cat)})'><img src="${cat.img}" onerror="this.src='https://i.imgur.com/placeholder.png'"><div>${escapeHtml(cat.name)}</div><i class="fas fa-chevron-right"></i></div></div>`;
      } else {
        const child = res.data;
        cardsHtml += `<div class="card"><div class="card-inner" onclick='openLinkWithTimer(${JSON.stringify(child)})'><img src="${child.img}" onerror="this.src='https://i.imgur.com/placeholder.png'"><div>${escapeHtml(child.name)}</div><i class="fas fa-download"></i></div></div>`;
      }
    });
    cardsHtml += `</div>`;
    resultArea.innerHTML = cardsHtml;
  }

  function renderHome() {
    currentView = "home";
    contentDiv.innerHTML = `
      <div class="hero-title">JoyWardana</div>
      <div class="search-container">
        <div class="search-wrapper">
          <i class="fas fa-search search-icon"></i>
          <input type="text" class="search-input" id="globalSearchInput" placeholder="Cari script..." autocomplete="off">
        </div>
      </div>
      <div id="searchResultArea" style="width:100%;"></div>
      <div class="hero-description">
        <p>Tempat terbaik untuk menemukan script Roblox terbaru. Support PC & Mobile, update cepat, dan anti crash. Akses script Sailor Piece, Violence District, Delta Executor, dan lainnya.</p>
      </div>
    `;
    const searchInput = document.getElementById("globalSearchInput");
    const resultArea = document.getElementById("searchResultArea");
    
    searchInput.addEventListener("input", (e) => {
      performSearch(e.target.value, resultArea);
    });
    searchInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        performSearch(e.target.value, resultArea);
      }
    });
    resultArea.innerHTML = '';
  }

  function renderCategoryList(data) {
    currentView = "list";
    if (!data.length) { 
      contentDiv.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i> Belum ada data.</div>`; 
      return; 
    }
    let html = `<div style="width:100%; text-align:left;">
                  <button class="back-button" id="backToHomeBtn"><i class="fas fa-arrow-left"></i> Kembali ke Home</button>
                </div>
                <div class="card-grid">`;
    data.forEach(cat => {
      html += `<div class="card"><div class="card-inner" onclick='renderDetailFromCategory(${JSON.stringify(cat)})'><img src="${cat.img}" onerror="this.src='https://i.imgur.com/placeholder.png'"><div>${escapeHtml(cat.name)}</div><i class="fas fa-folder-open"></i></div></div>`;
    });
    html += `</div>`;
    contentDiv.innerHTML = html;
    const backBtn = document.getElementById("backToHomeBtn");
    if (backBtn) backBtn.addEventListener("click", () => transitionTo(renderHome));
  }

  function renderDetailFromCategory(category) {
    currentView = "detail";
    if (!category.children?.length) {
      contentDiv.innerHTML = `<div style="width:100%; text-align:left;">
                                <button class="back-button" id="backToHomeFromEmpty"><i class="fas fa-arrow-left"></i> Kembali ke Home</button>
                              </div>
                              <div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Tidak ada script dalam kategori ini.</div>`;
      const backBtn = document.getElementById("backToHomeFromEmpty");
      if (backBtn) backBtn.addEventListener("click", () => transitionTo(renderHome));
      return;
    }
    let html = `<div style="width:100%; text-align:left;">
                  <button class="back-button" id="backToHomeFromDetail"><i class="fas fa-arrow-left"></i> Kembali ke Home</button>
                </div>
                <div class="card-grid">`;
    category.children.forEach(child => {
      html += `<div class="card"><div class="card-inner" onclick='openLinkWithTimer(${JSON.stringify(child)})'><img src="${child.img}" onerror="this.src='https://i.imgur.com/placeholder.png'"><div>${escapeHtml(child.name)}</div><i class="f
